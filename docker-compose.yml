services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgr-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledgr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledgr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
